name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  website:
    name: Website (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @nester/website build

      - name: Lint website
        run: pnpm --filter @nester/website lint

  intelligence:
    name: Intelligence (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/intelligence
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app

      - name: Test
        run: pytest

  dapp-frontend:
    name: Dapp Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dapp/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit
        working-directory: packages/contracts

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Audit Go dependencies
        run: govulncheck ./...
        working-directory: apps/api

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -severity medium ./...
        working-directory: apps/api

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Audit JavaScript dependencies
        run: pnpm audit --audit-level=high
        working-directory: apps/dapp/frontend

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python audit tools
        run: pip install pip-audit bandit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt
        working-directory: apps/intelligence

      - name: Run bandit
        run: bandit -r app -ll
        working-directory: apps/intelligence

  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: true

      - name: Test
        run: go test ./...

  internal-stellar:
    name: Internal (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Go module
        id: check
        run: |
          if [ -f "go.mod" ] && [ -d "internal" ]; then
            echo "has_module=true" >> $GITHUB_OUTPUT
          else
            echo "has_module=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        if: steps.check.outputs.has_module == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: steps.check.outputs.has_module == 'true'
        run: go test -v -race ./internal/...

      - name: Check formatting
        if: steps.check.outputs.has_module == 'true'
        run: |
          if [ "$(gofmt -s -l ./internal | wc -l)" -gt 0 ]; then
            echo "Code formatting issues found"
            gofmt -s -d ./internal
            exit 1
          fi

      - name: Run vet
        if: steps.check.outputs.has_module == 'true'
        run: go vet ./internal/...

  contracts:
    name: Contracts (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown


      - name: Build yield_registry WASM
        run: cargo build --release --target wasm32-unknown-unknown -p yield-registry-contract

      - name: Ensure yield_registry.wasm is available for allocation_strategy
        run: |
          mkdir -p contracts/allocation_strategy/../../../target/wasm32-unknown-unknown/release
          cp target/wasm32-unknown-unknown/release/yield_registry.wasm contracts/allocation_strategy/../../../target/wasm32-unknown-unknown/release/yield_registry.wasm

      - name: Build allocation_strategy WASM
        run: cargo build --release --target wasm32-unknown-unknown -p allocation-strategy-contract

      - name: Build vault_token WASM
        run: cargo build --release --target wasm32-unknown-unknown -p vault-token-contract

      - name: Test contracts
        run: cargo test --lib
